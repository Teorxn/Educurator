# ── Educurator ─────────────────────────────────────────────────────────────
#
# Modos de uso:
#
#   1) Solo infraestructura (db, chromadb, langfuse)
#      El frontend y backend se ejecutan en local a través de la terminal.
#
#        docker compose up -d
#
#   2) Stack completo (infra + api)
#
#        docker compose --profile full up -d
#
# ────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: educurator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # 5434 por defecto para no colisionar con instalaciones locales de Postgres
      - "${HOST_DB_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d educurator"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health').status == 200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET:-change-me-secret}
      SALT: ${LANGFUSE_SALT:-change-me-salt}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/public/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    # Overrides para que el contenedor se conecte a los servicios por su
    # nombre interno de red, ignorando los valores de .env (que apuntan a
    # localhost para ejecución local).
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/educurator
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
      LANGFUSE_HOST: http://langfuse:3000
    volumes:
      - ./data:/app/data
      - ./backend/alembic:/app/alembic
    depends_on:
      db:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    profiles: ["full"]
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
