# Desarrollo mixto: levanta servicios de infraestructura sin colisionar
# con instalaciones locales de Postgres.
#
# Hereda las definiciones del docker-compose.yml raíz y solo sobreescribe
# el puerto de base de datos (5434 en vez de 5432).
#
# Modo de uso:
#   docker compose up -d db chromadb
#
include:
  - ../docker-compose.yml

services:
  db:
    ports:
      - "5434:5432"
